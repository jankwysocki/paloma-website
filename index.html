<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Paloma Nad Wisłą</title>
  <meta name="description" content="Paloma: bistro w Pawilonie Tańca" />

  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://paloma.bar/">

  <link rel="icon" type="image/png" href="assets/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg" />
  <link rel="shortcut icon" href="assets/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Paloma" />
  <link rel="manifest" href="assets/favicon/site.webmanifest" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="site-background" aria-hidden="true">
    <video
      id="background-video"
      class="background-video"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      disablepictureinpicture
      preload="metadata"
      poster="assets/background/paloma-background-desktop-poster.webp"
      data-desktop-webm="assets/background/paloma-background-desktop.webm"
      data-desktop-mp4="assets/background/paloma-background-desktop.mp4"
      data-desktop-poster="assets/background/paloma-background-desktop-poster.webp"
    ></video>
  </div>

  <header class="site-header">
    <nav class="language-switcher" aria-label="Language switcher">
      <button
        class="language-button is-active"
        type="button"
        data-lang-switch="pl"
        aria-pressed="true"
      >
        PL
      </button>

      <span class="language-separator" aria-hidden="true">/</span>

      <button
        class="language-button"
        type="button"
        data-lang-switch="en"
        aria-pressed="false"
      >
        EN
      </button>
    </nav>
  </header>

  <main class="site-main">
    <div class="content-column">
      <picture>
        <source srcset="assets/logo_paloma.svg" type="image/svg+xml" />
        <img
          class="logo"
          src="assets/logo_paloma.png"
          alt="Paloma Nad Wisłą"
          width="420"
          height="120"
        />
      </picture>

      <nav class="main-links" aria-label="Main navigation">
        <a
          class="text-link"
          href="assets/menu/paloma-menu.pdf"
          target="_blank"
          rel="noopener noreferrer"
          type="application/pdf"
          data-i18n="menu"
        >
          Menu
        </a>

        <a
          class="text-link"
          href="files/paloma-nad-wisla-catering.pdf"
          target="_blank"
          rel="noopener noreferrer"
          data-i18n="catering"
        >
          Catering
        </a>

        <a
          class="text-link"
          href="https://maps.app.goo.gl/776dBrJmGrSNW9YEA"
          rel="noopener noreferrer"
          data-i18n="map"
        >
          Znajdź nas
        </a>

        <a
          class="text-link"
          href="mailto:rezerwacje@paloma.bar"
          target="_blank"
          rel="noopener noreferrer"
          data-i18n="contact"
        >
          Kontakt
        </a>
      </nav>

      <nav class="social-links" aria-label="Social media">
        <a
          class="social-link"
          href="https://www.instagram.com/paloma.nad.wisla/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Instagram"
        >
          <svg
            class="social-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <path d="M7.75 2h8.5A5.76 5.76 0 0 1 22 7.75v8.5A5.76 5.76 0 0 1 16.25 22h-8.5A5.76 5.76 0 0 1 2 16.25v-8.5A5.76 5.76 0 0 1 7.75 2Zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5Zm8.75 2.25a1.25 1.25 0 1 1 0 2.5a1.25 1.25 0 0 1 0-2.5ZM12 7a5 5 0 1 1 0 10a5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6a3 3 0 0 0 0-6Z" />
          </svg>
        </a>

        <a
          class="social-link"
          href="https://www.facebook.com/profile.php?id=100063678275378"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Facebook"
        >
          <svg
            class="social-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <path d="M14 8.5h2.5V5h-3C10.46 5 9 6.79 9 9.41V12H6.5v3.5H9V22h4v-6.5h3l.5-3.5H13V9.75c0-.86.34-1.25 1-1.25Z" />
          </svg>
        </a>
      </nav>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
